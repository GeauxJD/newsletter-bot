name: Fetch Newsletter Source Data

on:
  schedule:
    # Every Monday at 13:00 UTC. Adjust as you like: https://crontab.guru
    - cron: "0 13 * * 1"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: read

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch source content
        run: python fetch.py

      - name: Upload aggregated data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-${{ github.run_number }}
          path: aggregate.json
          retention-days: 90